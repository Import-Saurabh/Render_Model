version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.10
    commands:
      - echo "Installing Python dependencies"
      - python --version
      - pip install --upgrade pip
      - pip install -r requirements.txt

  pre_build:
    commands:
      - echo "Pre-build checks"
      - python -m py_compile main.py

  build:
    commands:
      - echo "CI successful"
